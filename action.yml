name: Miso PR Review
description: Review pull requests with OpenAI- or Anthropic-compatible models and post an optional sticky comment.

inputs:
  github_token:
    description: GitHub token for PR and API access
    required: true
  repo:
    description: Repository in owner/name format. Defaults to the current workflow repository.
    required: false
    default: ""
  pr_number:
    description: Pull request number. Defaults to the current pull_request event number.
    required: false
    default: ""
  ai_base_url:
    description: Base URL of the primary AI API
    required: true
  ai_api_format:
    description: API request/response format for the primary AI endpoint (openai or anthropic)
    required: false
    default: openai
  ai_model:
    description: Model name for the primary analysis pass
    required: true
  ai_api_key:
    description: Optional API key for the primary AI endpoint
    required: false
    default: ""
  ai_max_tokens:
    description: Maximum completion tokens for the primary and fallback final review calls
    required: false
    default: "4096"
  anthropic_version:
    description: Anthropic API version header used when ai_api_format or ai_fallback_api_format is anthropic
    required: false
    default: "2023-06-01"
  ai_fallback_base_url:
    description: Optional base URL of a fallback AI API
    required: false
    default: ""
  ai_fallback_api_format:
    description: Fallback API request/response format; defaults to ai_api_format when blank
    required: false
    default: ""
  ai_fallback_model:
    description: Optional model name for the fallback analysis pass
    required: false
    default: ""
  ai_fallback_api_key:
    description: Optional API key for the fallback endpoint
    required: false
    default: ""
  ai_primary_retries:
    description: Number of retries for the primary model
    required: false
    default: "8"
  ai_primary_retry_delay_sec:
    description: Delay between primary retries in seconds
    required: false
    default: "15"
  ai_stream:
    description: If true, use streaming responses to avoid timeouts behind proxies with short read timeouts (e.g. Cloudflare 100s edge timer)
    required: false
    default: "true"
  ai_fallback_stream:
    description: If set, overrides ai_stream for the fallback model; defaults to ai_stream value when blank
    required: false
    default: ""
  allowed_source_hosts:
    description: Comma-separated list of hosts allowed for linked source fetching
    required: false
    default: github.com,api.github.com,gitlab.com,registry.terraform.io,artifacthub.io
  system_prompt:
    description: Optional system prompt override
    required: false
    default: ""
  system_prompt_file:
    description: Optional file path in the reviewed repository to use as the full system prompt
    required: false
    default: ""
  standards_file:
    description: Repository standards file path for conventions and policy context
    required: false
    default: ""
  standards_file_candidates:
    description: Candidate files to auto-discover when standards_file is not set. First found is used.
    required: false
    default: AGENTS.md,agents.md,CLAUDE.md,claude.md,.github/ai-review-rules.md,.github/ai-review-rules.txt
  publish_review_comment:
    description: If true, publish or update a PR comment with the generated review
    required: false
    default: "false"
  publish_mode:
    description: >-
      Publish mode for the review verdict. 'comment' publishes a sticky PR comment (default).
      'review_comment' uses GitHub's native PR review API to submit a non-blocking review comment.
      'review_verdict' uses GitHub's native PR review API to submit approve/request_changes.
      Requires permissions: pull-requests: write for review_comment and review_verdict modes.
    required: false
    default: "comment"
  allow_approve:
    description: >-
      If true and publish_mode=review_verdict, the model's approve verdict can be submitted as a
      native approval. Defaults to false — approval is blocked unless explicitly enabled. WARNING:
      native approvals can affect branch protection rules and automerge pipelines.
    required: false
    default: "false"
  approve_forks:
    description: >-
      If true and publish_mode=review_verdict with allow_approve=true, native approvals are also
      allowed for cross-repository (fork) PRs. Defaults to false — fork PRs are blocked from
      approval even when allow_approve is set.
    required: false
    default: "false"
  cleanup_previous_native_reviews:
    description: >-
      Mark previous managed native PR reviews as outdated/superseded before publishing a new
      native review. Accepted values: `auto` (default, enables cleanup for review_comment and
      review_verdict modes), `true`, or `false`. Cleanup only targets reviews created by this
      action and carrying the managed marker. Dismissal of old approval/request-changes reviews
      is attempted when permissions allow but is secondary to visual cleanup.
    required: false
    default: "auto"
  context_limit_mode:
    description: Context budget mode - normal (140k/70k/220k), low (80k/40k/120k), minimal (40k/20k/60k)
    required: false
    default: normal
  evidence_providers_file:
    description: Optional JSON file in the reviewed repository that defines evidence providers to run before review
    required: false
    default: ""
  evidence_provider_timeout_sec:
    description: Default timeout in seconds for each evidence provider command
    required: false
    default: "30"
  evidence_provider_max_output_bytes:
    description: Maximum stdout or stderr bytes captured per evidence provider command
    required: false
    default: "20000"
  evidence_blocker_enforcement:
    description: If true, force request_changes when any evidence provider reports blocker severity
    required: false
    default: "false"
  evidence_enable_for_forks:
    description: If true, allow evidence providers to run on cross-repository pull requests
    required: false
    default: "false"
  tool_mode:
    description: Optional tool harness mode; set to plan_execute_once to let the model request read-only evidence tools before final review
    required: false
    default: "off"
  tool_max_requests:
    description: Maximum number of tool requests the harness executes when tool_mode is enabled
    required: false
    default: "4"
  tool_planning_timeout_sec:
    description: Timeout in seconds for the model planning call used by tool harness
    required: false
    default: "30"
  tool_planning_max_context_bytes:
    description: Maximum corpus bytes passed to the planning model
    required: false
    default: "50000"
  tool_planning_max_tokens:
    description: Maximum completion tokens for tool harness planning model call
    required: false
    default: "400"
  tool_max_response_bytes:
    description: Maximum bytes captured from each tool execution result
    required: false
    default: "12000"
  tool_allowed_gh_api_repos:
    description: Comma-separated owner/repo list allowed for gh_api tool requests; use * to allow any repo still permitted by the path allowlist (empty means current repo only)
    required: false
    default: ""
  tool_request_timeout_sec:
    description: Timeout in seconds for each tool request execution
    required: false
    default: "20"
  tool_failure_enforcement:
    description: If true, force request_changes when tool harness planning fails
    required: false
    default: "false"
  tool_min_successful_requests:
    description: Minimum number of successful tool requests required when tool failure enforcement is enabled
    required: false
    default: "0"
  tool_enable_for_forks:
    description: If true, allow the tool harness to run on cross-repository pull requests
    required: false
    default: "false"
  ai_request_timeout_sec:
    description: Timeout in seconds for the primary model API request (curl --max-time)
    required: false
    default: "300"
  ai_connect_timeout_sec:
    description: Timeout in seconds for the primary model API connection (curl --connect-timeout)
    required: false
    default: "30"
  ai_fallback_request_timeout_sec:
    description: Timeout in seconds for the fallback model API request (curl --max-time). Defaults to ai_request_timeout_sec when blank.
    required: false
    default: ""
  ai_fallback_connect_timeout_sec:
    description: Timeout in seconds for the fallback model API connection (curl --connect-timeout). Defaults to ai_connect_timeout_sec when blank.
    required: false
    default: ""
  skip_if_diff_unchanged:
    description: If true, skip the LLM review when the effective PR diff matches the last managed review comment fingerprint
    required: false
    default: "true"
  comment_marker:
    description: HTML marker for the managed PR comment
    required: false
    default: "<!-- ai-pr-reviewer -->"
  ci_status_check:
    description: If true, wait for all CI checks to reach a terminal state before starting the AI review. Polls commit-status API for the PR head SHA. Default false — immediate review (original behavior).
    required: false
    default: "false"
  ci_timeout_sec:
    description: Maximum seconds to wait for CI checks to complete when ci_status_check=true. Default 300.
    required: false
    default: "300"
  ci_interval_sec:
    description: Seconds between CI status polls when ci_status_check=true. Default 15.
    required: false
    default: "15"
  ci_skip_on_timeout:
    description: If true, proceed with review after timeout instead of failing. If false, abort the action on timeout. Default true.
    required: false
    default: "true"
  review_scope:
    description: >-
      Controls whether the action reviews the full PR or only changes since the
      last managed review. auto performs a full review first, then incremental
      reviews on later PR synchronize events when safe. Accepted values: auto,
      full, incremental.
    required: false
    default: "auto"

outputs:

  verdict:
    description: AI verdict, approve or request_changes
    value: ${{ steps.review.outputs.verdict }}
  review_markdown:
    description: Human-readable markdown review body
    value: ${{ steps.review.outputs.review_markdown }}
  analysis_engine:
    description: Model and endpoint that produced the final result
    value: ${{ steps.review.outputs.analysis_engine }}
  should_review:
    description: Whether the action determined a new LLM review is needed
    value: ${{ steps.precheck.outputs.should_review }}
  skip_reason:
    description: Reason the LLM review was skipped
    value: ${{ steps.precheck.outputs.skip_reason }}
  diff_fingerprint:
    description: Stable fingerprint of the current pull request patch
    value: ${{ steps.precheck.outputs.diff_fingerprint }}
  ci_status_skipped:
    description: Whether CI status check was skipped (true) or completed (false)
    value: ${{ steps.ci_status.outputs.ci_status_skipped }}
  ci_status_final:
    description: Final CI state (success/failure) when ci_status_check completed
    value: ${{ steps.ci_status.outputs.ci_status_final }}
  effective_review_scope:
    description: Effective review scope used (full or incremental)
    value: ${{ steps.precheck.outputs.effective_review_scope }}
  previous_head_sha:
    description: Previous head SHA when effective scope is incremental
    value: ${{ steps.precheck.outputs.previous_head_sha }}
  baseline_clean:
    description: Whether the full-review baseline was clean (for verdict safety)
    value: ${{ steps.precheck.outputs.baseline_clean }}

runs:
  using: composite
  steps:
    - name: Validate runtime dependencies
      shell: bash
      run: |
        set -euo pipefail
        command -v gh >/dev/null
        command -v jq >/dev/null
        command -v curl >/dev/null
        command -v git >/dev/null
        command -v python3 >/dev/null

    - name: Check whether review is needed
      id: precheck
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo || github.repository }}
        PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
        COMMENT_MARKER: ${{ inputs.comment_marker }}
        REVIEW_SCOPE: ${{ inputs.review_scope }}
        SKIP_IF_DIFF_UNCHANGED: ${{ inputs.skip_if_diff_unchanged }}
        ACTION_REF: ${{ github.action_ref }}
        AI_MODEL: ${{ inputs.ai_model }}
        AI_API_FORMAT: ${{ inputs.ai_api_format }}
        AI_FALLBACK_MODEL: ${{ inputs.ai_fallback_model }}
        ANTHROPIC_VERSION: ${{ inputs.anthropic_version }}
        SYSTEM_PROMPT: ${{ inputs.system_prompt }}
        SYSTEM_PROMPT_FILE: ${{ inputs.system_prompt_file }}
        STANDARDS_FILE: ${{ inputs.standards_file }}
        STANDARDS_FILE_CANDIDATES: ${{ inputs.standards_file_candidates }}
        CONTEXT_LIMIT_MODE: ${{ inputs.context_limit_mode }}
        EVIDENCE_PROVIDERS_FILE: ${{ inputs.evidence_providers_file }}
        EVIDENCE_PROVIDER_TIMEOUT_SEC: ${{ inputs.evidence_provider_timeout_sec }}
        EVIDENCE_PROVIDER_MAX_OUTPUT_BYTES: ${{ inputs.evidence_provider_max_output_bytes }}
        EVIDENCE_BLOCKER_ENFORCEMENT: ${{ inputs.evidence_blocker_enforcement }}
        EVIDENCE_ENABLE_FOR_FORKS: ${{ inputs.evidence_enable_for_forks }}
        TOOL_MODE: ${{ inputs.tool_mode }}
        TOOL_MAX_REQUESTS: ${{ inputs.tool_max_requests }}
        TOOL_PLANNING_TIMEOUT_SEC: ${{ inputs.tool_planning_timeout_sec }}
        TOOL_PLANNING_MAX_CONTEXT_BYTES: ${{ inputs.tool_planning_max_context_bytes }}
        TOOL_PLANNING_MAX_TOKENS: ${{ inputs.tool_planning_max_tokens }}
        TOOL_MAX_RESPONSE_BYTES: ${{ inputs.tool_max_response_bytes }}
        TOOL_ALLOWED_GH_API_REPOS: ${{ inputs.tool_allowed_gh_api_repos }}
        TOOL_REQUEST_TIMEOUT_SEC: ${{ inputs.tool_request_timeout_sec }}
        TOOL_FAILURE_ENFORCEMENT: ${{ inputs.tool_failure_enforcement }}
        TOOL_MIN_SUCCESSFUL_REQUESTS: ${{ inputs.tool_min_successful_requests }}
        TOOL_ENABLE_FOR_FORKS: ${{ inputs.tool_enable_for_forks }}
        AI_REQUEST_TIMEOUT_SEC: ${{ inputs.ai_request_timeout_sec }}
        AI_CONNECT_TIMEOUT_SEC: ${{ inputs.ai_connect_timeout_sec }}
        AI_FALLBACK_REQUEST_TIMEOUT_SEC: ${{ inputs.ai_fallback_request_timeout_sec }}
        AI_FALLBACK_CONNECT_TIMEOUT_SEC: ${{ inputs.ai_fallback_connect_timeout_sec }}
      run: bash "${{ github.action_path }}/scripts/check_review_needed.sh"

    - name: Wait for CI checks to complete
      id: ci_status
      if: inputs.ci_status_check == 'true' && steps.precheck.outputs.should_review == 'true'
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo || github.repository }}
        PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
        CI_TIMEOUT_SEC: ${{ inputs.ci_timeout_sec }}
        CI_INTERVAL_SEC: ${{ inputs.ci_interval_sec }}
        CI_SKIP_ON_TIMEOUT: ${{ inputs.ci_skip_on_timeout }}
      run: bash "${{ github.action_path }}/scripts/wait_for_ci.sh"

    - name: Run AI review
      if: steps.precheck.outputs.should_review == 'true'
      id: review
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo || github.repository }}
        PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
        AI_BASE_URL: ${{ inputs.ai_base_url }}
        AI_API_FORMAT: ${{ inputs.ai_api_format }}
        AI_MODEL: ${{ inputs.ai_model }}
        AI_API_KEY: ${{ inputs.ai_api_key }}
        AI_MAX_TOKENS: ${{ inputs.ai_max_tokens }}
        ANTHROPIC_VERSION: ${{ inputs.anthropic_version }}
        AI_FALLBACK_BASE_URL: ${{ inputs.ai_fallback_base_url }}
        AI_FALLBACK_API_FORMAT: ${{ inputs.ai_fallback_api_format }}
        AI_FALLBACK_MODEL: ${{ inputs.ai_fallback_model }}
        AI_FALLBACK_API_KEY: ${{ inputs.ai_fallback_api_key }}
        AI_PRIMARY_RETRIES: ${{ inputs.ai_primary_retries }}
        AI_PRIMARY_RETRY_DELAY_SEC: ${{ inputs.ai_primary_retry_delay_sec }}
        AI_STREAM: ${{ inputs.ai_stream }}
        AI_FALLBACK_STREAM: ${{ inputs.ai_fallback_stream }}
        ALLOWED_SOURCE_HOSTS: ${{ inputs.allowed_source_hosts }}
        SYSTEM_PROMPT: ${{ inputs.system_prompt }}
        SYSTEM_PROMPT_FILE: ${{ inputs.system_prompt_file }}
        STANDARDS_FILE: ${{ inputs.standards_file }}
        STANDARDS_FILE_CANDIDATES: ${{ inputs.standards_file_candidates }}
        CONTEXT_LIMIT_MODE: ${{ inputs.context_limit_mode }}
        EVIDENCE_PROVIDERS_FILE: ${{ inputs.evidence_providers_file }}
        EVIDENCE_PROVIDER_TIMEOUT_SEC: ${{ inputs.evidence_provider_timeout_sec }}
        EVIDENCE_PROVIDER_MAX_OUTPUT_BYTES: ${{ inputs.evidence_provider_max_output_bytes }}
        EVIDENCE_BLOCKER_ENFORCEMENT: ${{ inputs.evidence_blocker_enforcement }}
        EVIDENCE_ENABLE_FOR_FORKS: ${{ inputs.evidence_enable_for_forks }}
        TOOL_MODE: ${{ inputs.tool_mode }}
        TOOL_MAX_REQUESTS: ${{ inputs.tool_max_requests }}
        TOOL_PLANNING_TIMEOUT_SEC: ${{ inputs.tool_planning_timeout_sec }}
        TOOL_PLANNING_MAX_CONTEXT_BYTES: ${{ inputs.tool_planning_max_context_bytes }}
        TOOL_PLANNING_MAX_TOKENS: ${{ inputs.tool_planning_max_tokens }}
        TOOL_MAX_RESPONSE_BYTES: ${{ inputs.tool_max_response_bytes }}
        TOOL_ALLOWED_GH_API_REPOS: ${{ inputs.tool_allowed_gh_api_repos }}
        TOOL_REQUEST_TIMEOUT_SEC: ${{ inputs.tool_request_timeout_sec }}
        TOOL_FAILURE_ENFORCEMENT: ${{ inputs.tool_failure_enforcement }}
        TOOL_MIN_SUCCESSFUL_REQUESTS: ${{ inputs.tool_min_successful_requests }}
        TOOL_ENABLE_FOR_FORKS: ${{ inputs.tool_enable_for_forks }}
        AI_REQUEST_TIMEOUT_SEC: ${{ inputs.ai_request_timeout_sec }}
        AI_CONNECT_TIMEOUT_SEC: ${{ inputs.ai_connect_timeout_sec }}
        AI_FALLBACK_REQUEST_TIMEOUT_SEC: ${{ inputs.ai_fallback_request_timeout_sec }}
        AI_FALLBACK_CONNECT_TIMEOUT_SEC: ${{ inputs.ai_fallback_connect_timeout_sec }}
        CI_STATUS_CHECK: ${{ inputs.ci_status_check }}
        CI_STATUS_FINAL: ${{ steps.ci_status.outputs.ci_status_final }}
        CI_STATUS_SKIPPED: ${{ steps.ci_status.outputs.ci_status_skipped }}
        REVIEW_SCOPE: ${{ inputs.review_scope }}
        EFFECTIVE_SCOPE: ${{ steps.precheck.outputs.effective_review_scope }}
        PREVIOUS_HEAD_SHA: ${{ steps.precheck.outputs.previous_head_sha }}
      run: bash "${{ github.action_path }}/scripts/run_review.sh"

    - name: Publish review comment
      if: inputs.publish_review_comment == 'true' && steps.precheck.outputs.should_review == 'true' && inputs.publish_mode == 'comment'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo || github.repository }}
        PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        BROAD_FINGERPRINT: ${{ steps.precheck.outputs.diff_fingerprint }}
        VERDICT: ${{ steps.review.outputs.verdict }}
        REVIEW_MARKDOWN: ${{ steps.review.outputs.review_markdown }}
        ANALYSIS_ENGINE: ${{ steps.review.outputs.analysis_engine }}
        COMMENT_MARKER: ${{ inputs.comment_marker }}
      run: |
        set -euo pipefail
        # Sanitize model output: strip internal metadata markers that the model
        # might have generated, preventing fake markers from interfering with precheck.
        printf '%s\n' "$REVIEW_MARKDOWN" > review-markdown.raw.md
        python3 "${{ github.action_path }}/scripts/strip_metadata_markers.py" review-markdown.raw.md
        # Neutralize upstream PR/issue/commit references so GitHub does not auto-link them.
        python3 "${{ github.action_path }}/scripts/sanitize_review_markdown.py" review-markdown.raw.md


        if [ -z "${PR_NUMBER:-}" ]; then
          echo "publish_review_comment=true requires a pull_request event or explicit pr_number" >&2
          exit 1
        fi

        if [ "$VERDICT" = "request_changes" ]; then
          VERDICT_PREFIX="⚠️ **Automated recommendation: REQUEST CHANGES**"
        else
          VERDICT_PREFIX="✅ **Automated recommendation: APPROVE**"
        fi

        # Resolve effective scope from precheck
        EFFECTIVE_SCOPE="${{ steps.precheck.outputs.effective_review_scope || 'full' }}"

        # Determine review result for metadata marker
        REVIEW_RESULT="clean"
        if [ "$VERDICT" = "request_changes" ]; then
          REVIEW_RESULT="issues"
        fi

        # Build metadata marker
        METADATA_MARKER="<!-- ai-pr-reviewer:{\"version\":1,\"head_sha\":\"${HEAD_SHA:-unknown}\",\"base_sha\":\"${{ github.event.pull_request.base.sha || '' }}\",\"review_scope\":\"${EFFECTIVE_SCOPE}\",\"review_result\":\"${REVIEW_RESULT}\"}"
        if [ "$EFFECTIVE_SCOPE" = "incremental" ] && [ -n "${{ steps.precheck.outputs.previous_head_sha:-}}" ]; then
          METADATA_MARKER="${METADATA_MARKER%,*},\"previous_head_sha\":\"${{ steps.precheck.outputs.previous_head_sha }}\"}"
        fi

        {
          echo "$METADATA_MARKER"
          if [ -n "${HEAD_SHA:-}" ]; then
            echo "<!-- ai-pr-review-sha:${HEAD_SHA} -->"
          fi
          if [ -n "${BROAD_FINGERPRINT:-}" ]; then
            echo "<!-- ai-pr-review-fingerprint:${BROAD_FINGERPRINT} -->"
          fi
          echo "$VERDICT_PREFIX"
          echo
          echo "_Analysis engine: ${ANALYSIS_ENGINE}_$(if [ \"$EFFECTIVE_SCOPE\" = \"incremental\" ]; then echo \" (incremental delta review)\"; fi)_"
          echo
          cat review-markdown.raw.md
        } > review-comment.md

        gh pr comment "$PR_NUMBER" --repo "$REPO" --edit-last --create-if-none --body-file review-comment.md

    - name: Publish review comment (non-blocking)
      if: inputs.publish_mode == 'review_comment' && steps.precheck.outputs.should_review == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo || github.repository }}
        PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        VERDICT: ${{ steps.review.outputs.verdict }}
        REVIEW_MARKDOWN: ${{ steps.review.outputs.review_markdown }}
        ANALYSIS_ENGINE: ${{ steps.review.outputs.analysis_engine }}
        CLEANUP_PREVIOUS_NATIVE_REVIEWS: ${{ inputs.cleanup_previous_native_reviews }}
      run: |
        set -euo pipefail
        # Sanitize model output: strip internal metadata markers that the model
        # might have generated, preventing fake markers from interfering with precheck.
        printf '%s\n' "$REVIEW_MARKDOWN" > review-comment-markdown.raw.md
        python3 "${{ github.action_path }}/scripts/strip_metadata_markers.py" review-comment-markdown.raw.md
        # Neutralize upstream PR/issue/commit references so GitHub does not auto-link them.
        python3 "${{ github.action_path }}/scripts/sanitize_review_markdown.py" review-comment-markdown.raw.md


        if [ -z "${PR_NUMBER:-}" ]; then
          echo "publish_mode=review_comment requires a pull_request event or explicit pr_number" >&2
          exit 1
        fi

        # Resolve cleanup flag: auto enables for review_comment mode
        CLEANUP_NATIVE_REVIEWS=false
        case "$(printf '%s' "${CLEANUP_PREVIOUS_NATIVE_REVIEWS:-auto}" | tr '[:upper:]' '[:lower:]')" in
          true) CLEANUP_NATIVE_REVIEWS=true ;;
          false) CLEANUP_NATIVE_REVIEWS=false ;;
          auto|"") CLEANUP_NATIVE_REVIEWS=true ;;
          *) echo "Invalid cleanup_previous_native_reviews value; expected auto, true, or false" >&2; exit 1 ;;
        esac

        # Cleanup previous managed native reviews if enabled
        if [ "$CLEANUP_NATIVE_REVIEWS" = "true" ]; then
          echo "Cleaning up previous managed native reviews for #$PR_NUMBER"
          CURRENT_ACTOR="$(gh api user --jq .login 2>/dev/null || echo "")"
          if [ -n "$CURRENT_ACTOR" ]; then
            PREV_REVIEWS="$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate --jq '.[] | select(.user.login == "'"$CURRENT_ACTOR"'" and (.body | contains("<!-- ai-pr-reviewer -->"))) | .id' 2>/dev/null || echo "")"
            if [ -n "$PREV_REVIEWS" ]; then
              while IFS= read -r REVIEW_ID; do
                if [ -z "$REVIEW_ID" ]; then continue; fi
                # Dismiss approval/request-changes reviews to stop stale verdicts from counting
                REVIEW_STATE="$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$REVIEW_ID" --jq '.state // ""' 2>/dev/null || echo "")"
                if [ "$REVIEW_STATE" = "APPROVED" ] || [ "$REVIEW_STATE" = "CHANGES_REQUESTED" ]; then
                  if gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$REVIEW_ID/dismissals" --method PUT -f message="Superseded by a newer automated review for this pull request." --jq '.id' >/dev/null 2>&1; then
                    echo "  Dismissed outdated managed review #$REVIEW_ID ($REVIEW_STATE)"
                  else
                    echo "  WARN: Could not dismiss review #$REVIEW_ID (may require additional permissions)" >&2
                  fi
                fi
                # Update body to compact outdated stub (best-effort)
                OUTDATED_BODY="$(printf '<!-- ai-pr-reviewer -->\n_Outdated: superseded by a newer automated review._')"
                if ! gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$REVIEW_ID" --method PATCH -f body="$OUTDATED_BODY" >/dev/null 2>&1; then
                  echo "  WARN: Could not update review #$REVIEW_ID body (submitted reviews may be read-only)" >&2
                else
                  echo "  Marked review #$REVIEW_ID as outdated/superseded"
                fi
              done <<< "$PREV_REVIEWS"
            else
              echo "  No previous managed native reviews found for #$PR_NUMBER"
            fi
          else
            echo "  WARN: Could not determine current actor; skipping cleanup" >&2
          fi
        fi

        # Resolve effective scope from precheck
        EFFECTIVE_SCOPE="${{ steps.precheck.outputs.effective_review_scope || 'full' }}"

        # Determine review result for metadata marker
        REVIEW_RESULT="clean"
        if [ "$VERDICT" = "request_changes" ]; then
          REVIEW_RESULT="issues"
        fi

        # Build metadata marker
        METADATA_MARKER="<!-- ai-pr-reviewer:{\"version\":1,\"head_sha\":\"${HEAD_SHA:-unknown}\",\"base_sha\":\"${{ github.event.pull_request.base.sha || '' }}\",\"review_scope\":\"${EFFECTIVE_SCOPE}\",\"review_result\":\"${REVIEW_RESULT}\"}"

        # Build the review body with managed marker
        BODY_FILE="review-comment-body.md"
        {
          echo "$METADATA_MARKER"
          echo "# AI Automated Review"
          echo
          echo "_Analysis engine: ${ANALYSIS_ENGINE}_$(if [ \"$EFFECTIVE_SCOPE\" = \"incremental\" ]; then echo \" (incremental delta review)\"; fi)_"
          echo
          cat review-comment-markdown.raw.md
        } > "$BODY_FILE"

        if [ "$VERDICT" = "request_changes" ]; then
          echo "Submitting non-blocking review comment (request_changes) for #$PR_NUMBER"
        else
          echo "Submitting non-blocking review comment (approve) for #$PR_NUMBER"
        fi

        gh pr review "$PR_NUMBER" --repo "$REPO" --comment --body-file "$BODY_FILE"

    - name: Publish review verdict (native PR review)
      if: inputs.publish_mode == 'review_verdict' && steps.precheck.outputs.should_review == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo || github.repository }}
        PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        VERDICT: ${{ steps.review.outputs.verdict }}
        REVIEW_MARKDOWN: ${{ steps.review.outputs.review_markdown }}
        ANALYSIS_ENGINE: ${{ steps.review.outputs.analysis_engine }}
        ALLOW_APPROVE: ${{ inputs.allow_approve }}
        APPROVE_FORKS: ${{ inputs.approve_forks }}
        CLEANUP_PREVIOUS_NATIVE_REVIEWS: ${{ inputs.cleanup_previous_native_reviews }}
      run: |
        set -euo pipefail
        # Sanitize model output: strip internal metadata markers that the model
        # might have generated, preventing fake markers from interfering with precheck.
        printf '%s\n' "$REVIEW_MARKDOWN" > review-verdict-markdown.raw.md
        python3 "${{ github.action_path }}/scripts/strip_metadata_markers.py" review-verdict-markdown.raw.md
        # Neutralize upstream PR/issue/commit references so GitHub does not auto-link them.
        python3 "${{ github.action_path }}/scripts/sanitize_review_markdown.py" review-verdict-markdown.raw.md


        if [ -z "${PR_NUMBER:-}" ]; then
          echo "publish_mode=review_verdict requires a pull_request event or explicit pr_number" >&2
          exit 1
        fi

        # Resolve cleanup flag: auto enables for review_verdict mode
        CLEANUP_NATIVE_REVIEWS=false
        case "$(printf '%s' "${CLEANUP_PREVIOUS_NATIVE_REVIEWS:-auto}" | tr '[:upper:]' '[:lower:]')" in
          true) CLEANUP_NATIVE_REVIEWS=true ;;
          false) CLEANUP_NATIVE_REVIEWS=false ;;
          auto|"") CLEANUP_NATIVE_REVIEWS=true ;;
          *) echo "Invalid cleanup_previous_native_reviews value; expected auto, true, or false" >&2; exit 1 ;;
        esac

        # Cleanup previous managed native reviews if enabled
        if [ "$CLEANUP_NATIVE_REVIEWS" = "true" ]; then
          echo "Cleaning up previous managed native reviews for #$PR_NUMBER"
          CURRENT_ACTOR="$(gh api user --jq .login 2>/dev/null || echo "")"
          if [ -n "$CURRENT_ACTOR" ]; then
            PREV_REVIEWS="$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate --jq '.[] | select(.user.login == "'"$CURRENT_ACTOR"'" and (.body | contains("<!-- ai-pr-reviewer -->"))) | .id' 2>/dev/null || echo "")"
            if [ -n "$PREV_REVIEWS" ]; then
              while IFS= read -r REVIEW_ID; do
                if [ -z "$REVIEW_ID" ]; then continue; fi
                # Dismiss approval/request-changes reviews to stop stale verdicts from counting
                REVIEW_STATE="$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$REVIEW_ID" --jq '.state // ""' 2>/dev/null || echo "")"
                if [ "$REVIEW_STATE" = "APPROVED" ] || [ "$REVIEW_STATE" = "CHANGES_REQUESTED" ]; then
                  if gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$REVIEW_ID/dismissals" --method PUT -f message="Superseded by a newer automated review for this pull request." --jq '.id' >/dev/null 2>&1; then
                    echo "  Dismissed outdated managed review #$REVIEW_ID ($REVIEW_STATE)"
                  else
                    echo "  WARN: Could not dismiss review #$REVIEW_ID (may require additional permissions)" >&2
                  fi
                fi
                # Update body to compact outdated stub (best-effort)
                OUTDATED_BODY="$(printf '<!-- ai-pr-reviewer -->\n_Outdated: superseded by a newer automated review._')"
                if ! gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$REVIEW_ID" --method PATCH -f body="$OUTDATED_BODY" >/dev/null 2>&1; then
                  echo "  WARN: Could not update review #$REVIEW_ID body (submitted reviews may be read-only)" >&2
                else
                  echo "  Marked review #$REVIEW_ID as outdated/superseded"
                fi
              done <<< "$PREV_REVIEWS"
            else
              echo "  No previous managed native reviews found for #$PR_NUMBER"
            fi
          else
            echo "  WARN: Could not determine current actor; skipping cleanup" >&2
          fi
        fi

        # Determine if the PR is from a fork
        IS_FORK_PR="$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '((.head.repo.full_name // "") != (.base.repo.full_name // ""))' 2>/dev/null || echo false)"

        # Resolve effective scope from precheck
        EFFECTIVE_SCOPE="${{ steps.precheck.outputs.effective_review_scope || 'full' }}"
        PREVIOUS_HEAD_SHA="${{ steps.precheck.outputs.previous_head_sha:-}}"
        BASELINE_CLEAN="${{ steps.precheck.outputs.baseline_clean:-false }}"

        # Determine review result for metadata marker
        REVIEW_RESULT="clean"
        if [ "$VERDICT" = "request_changes" ]; then
          REVIEW_RESULT="issues"
        fi

        # Build metadata marker with verdict safety for incremental
        METADATA_MARKER="<!-- ai-pr-reviewer:{\"version\":1,\"head_sha\":\"${HEAD_SHA:-unknown}\",\"base_sha\":\"${{ github.event.pull_request.base.sha || '' }}\",\"review_scope\":\"${EFFECTIVE_SCOPE}\",\"review_result\":\"${REVIEW_RESULT}\"}"
        if [ "$EFFECTIVE_SCOPE" = "incremental" ] && [ -n "$PREVIOUS_HEAD_SHA" ]; then
          METADATA_MARKER="${METADATA_MARKER%,*},\"previous_head_sha\":\"${PREVIOUS_HEAD_SHA}\"}"
        fi

        # Evaluate approval guardrails with baseline check for incremental
        ALLOW_APPROVE_BOOL="$(printf '%s' "$ALLOW_APPROVE" | tr '[:upper:]' '[:lower:]')"
        APPROVE_FORKS_BOOL="$(printf '%s' "$APPROVE_FORKS" | tr '[:upper:]' '[:lower:]')"

        CAN_APPROVE=false

        if [ "$VERDICT" = "approve" ] && [ "$ALLOW_APPROVE_BOOL" = "true" ]; then
          # For incremental reviews, require a trusted clean full baseline
          if [ "$EFFECTIVE_SCOPE" = "incremental" ] && [ "$BASELINE_CLEAN" != "true" ]; then
            echo "Blocking approval: incremental review without trusted clean full baseline" >&2
            CAN_APPROVE=false
          else
            # Check fork gate
            if [ "$IS_FORK_PR" != "true" ]; then
              CAN_APPROVE=true
            elif [ "$APPROVE_FORKS_BOOL" = "true" ]; then
              CAN_APPROVE=true
            fi
          fi
        fi

        # Build the review body with managed marker
        BODY_FILE="review-verdict-body.md"
        {
          echo "$METADATA_MARKER"
          echo "# AI Automated Review"
          echo
          if [ "$EFFECTIVE_SCOPE" = "incremental" ]; then
            echo "_Incremental review: reviewed changes since the last managed review. This is not a full re-review of the entire PR._"
          else
            echo "_Full PR review._"
          fi
          echo
          echo "_Analysis engine: ${ANALYSIS_ENGINE}_$(if [ \"$EFFECTIVE_SCOPE\" = \"incremental\" ]; then echo \" (incremental delta review)\"; fi)_"
          echo
          cat review-verdict-markdown.raw.md
        } > "$BODY_FILE"

        if [ "$CAN_APPROVE" = true ]; then
          echo "Submitting native approval for #$PR_NUMBER"
          if ! gh pr review "$PR_NUMBER" --repo "$REPO" --approve --body-file "$BODY_FILE" 2>&1; then
            echo "ERROR: Native approval failed for #$PR_NUMBER." >&2
            echo "This may be caused by the 'Allow GitHub Actions to create and approve pull requests' setting being disabled." >&2
            echo "Enable this setting at: Repository Settings → Actions → General → Allow GitHub Actions to create and approve pull requests" >&2
            echo "Or at the organization level: Organization Settings → Actions → Organization permissions → Allow GitHub Actions to create and approve pull requests" >&2
            exit 1
          fi
        else
          # Block approval: submit request_changes with explanation
          echo "Blocking native approval for #$PR_NUMBER (allow_approve=${ALLOW_APPROVE_BOOL}, approve_forks=${APPROVE_FORKS_BOOL}, is_fork=${IS_FORK_PR})"

          if [ "$VERDICT" = "request_changes" ]; then
            gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes --body-file "$BODY_FILE"
          else
            # Model approved but guardrails blocked it
            {
              echo ""
              echo "> **Approval blocked by policy**: This workflow requires \`allow_approve: true\` to submit native approvals. Set that input to enable automatic approval."
            } >> "$BODY_FILE"

            gh pr review "$PR_NUMBER" --repo "$REPO" --request-changes --body-file "$BODY_FILE"
          fi
        fi
