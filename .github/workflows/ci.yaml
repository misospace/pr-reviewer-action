name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          # Pinned to 3.14 to match the local dev interpreter — a version skew
          # between local and CI is how the duplicate-key regression test first
          # shipped broken (passed on local 3.9, ModuleNotFoundError on CI 3.x).
          python-version: '3.14'

      - name: Install test dependencies
        run: pip install pytest pytest-cov yamllint

      - name: Validate action metadata YAML
        run: ruby -e 'require "yaml"; YAML.load_file("action.yml")'

      - name: Validate example workflow YAML
        run: ruby -e 'require "yaml"; YAML.load_file("examples/workflow-self-hosted.yml"); YAML.load_file("examples/workflow-cloud.yml")'

      # GitHub's Actions runner rejects a mapping with a duplicate key at load
      # time ("'X' is already defined") — but ruby/python YAML loaders silently
      # keep the last value, so the loads above pass on a manifest the runner
      # would reject. This shipped the broken v1.2.10 (duplicate PLATFORM in
      # three env: blocks, #255). yamllint's key-duplicates rule catches the
      # whole class at any nesting depth, across the manifest and every workflow.
      - name: Lint for duplicate YAML keys
        run: |
          yamllint -d "{rules: {key-duplicates: enable}}" \
            action.yml \
            .github/workflows/*.yaml \
            examples/*.yml

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

      - name: Check shell scripts
        run: |
          set -euo pipefail
          for f in scripts/*.sh tests/*.sh; do
            bash -n "$f"
          done

      - name: Check Python scripts
        run: python3 -m py_compile scripts/image_digest_analysis.py scripts/run_evidence_providers.py scripts/run_tool_harness.py tests/mock_openai_server.py tests/test_model_parsing.py tests/test_redact.py tests/test_strip_metadata_markers.py tests/test_evidence_providers.py pr_reviewer/forgejo_backend.py

      - name: Verify smoke test helper is executable
        run: test -x tests/smoke_test.sh

      - name: Run smoke test
        run: tests/smoke_test.sh

      - name: Verify Forgejo E2E smoke harness parses
        run: bash -n tests/forgejo_e2e_smoke.sh

      # Coverage is scoped to pr_reviewer/ and scripts/ — the bash test suites
      # below cover the shell side, which pytest-cov can't measure.
      # Threshold: measured baseline was 76% (2026-07-03); gate at 72 to absorb
      # small fluctuations. Ratchet toward the audit's 80% as coverage grows.
      - name: Run Python tests (auto-discover all 215)
        run: |
          COV_FAIL_UNDER=72
          pytest tests/ -v --tb=short \
            --cov=pr_reviewer --cov=scripts \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under="$COV_FAIL_UNDER"

      # Auto-discover every bash suite so a new (or previously unlisted) suite
      # cannot silently stay out of CI. The smoke test runs separately above.
      - name: Run bash test suites (auto-discover)
        run: |
          set -euo pipefail
          failed=0
          for t in tests/test_*.sh; do
            echo "::group::$t"
            if ! bash "$t"; then
              echo "::error::$t failed"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "$failed"
